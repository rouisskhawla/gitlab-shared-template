
.build-template:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar

.docker-template:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest

.deploy-staging-template:
  stage: deploy-staging
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/$SERVICE_NAME
        $SERVICE_NAME=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --namespace=staging
    - kubectl rollout status deployment/$SERVICE_NAME --namespace=staging
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

.deploy-production-template:
  stage: deploy-production
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/$SERVICE_NAME
        $SERVICE_NAME=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --namespace=production
    - kubectl rollout status deployment/$SERVICE_NAME --namespace=production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual